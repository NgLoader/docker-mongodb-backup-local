name: CI

on:
  push:
    branches:
      - 'main'
    paths-ignore:
      - '**.md'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  test-postgresql:
    runs-on: ubuntu-22.04
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: "database"
          POSTGRES_USER: "user"
          POSTGRES_PASSWORD: "test"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_TYPE: "postgresql"
      DB_HOST: "127.0.0.1"
      DB_PORT: 5432
      DB_NAME: "database"
      DB_USER: "user"
      DB_PASS: "test"
      DB_NAME_FILE: "**None**"
      DB_USER_FILE: "**None**"
      DB_PASS_FILE: "**None**"
      DB_PASSFILE_STORE: "**None**"
      DB_AUTH: "**None**"
      BACKUP_DIR: "/tmp/backups"
      BACKUP_LATEST_TYPE: "symlink"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      BACKUP_KEEP_MINS: 1440
      WEBHOOK_URL: "**None**"
      WEBHOOK_EXTRA_ARGS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install postgresql-client-18
        run: |
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/apt.postgresql.org.gpg
          echo "deb https://apt.postgresql.org/pub/repos/apt jammy-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18

      - name: Test backup script for pg_dump
        env:
          DB_CLUSTER: "FALSE"
          DB_EXTRA_OPTS: "-Z0"
          BACKUP_SUFFIX: ".sql.gz"
        run: |
          echo "Test backup script for pg_dump..."
          rm -fR "$BACKUP_DIR"
          mkdir -p "$BACKUP_DIR"
          bash -x backup.sh
          echo "Generated backup files:"
          ls -laR "$BACKUP_DIR"

      - name: Test backup script for pg_dump with directories
        env:
          DB_CLUSTER: "FALSE"
          DB_EXTRA_OPTS: "-Z0 -Fd"
          BACKUP_SUFFIX: ""
        run: |
          echo "Test backup script for pg_dump with directories..."
          rm -fR "$BACKUP_DIR"
          mkdir -p "$BACKUP_DIR"
          bash -x backup.sh
          echo "Generated backup files:"
          ls -laR "$BACKUP_DIR"

      - name: Test backup script for pg_dumpall
        env:
          DB_CLUSTER: "TRUE"
          DB_EXTRA_OPTS: ""
          BACKUP_SUFFIX: ".sql.gz"
        run: |
          echo "Test backup script for pg_dumpall..."
          rm -fR "$BACKUP_DIR"
          mkdir -p "$BACKUP_DIR"
          bash -x backup.sh
          echo "Generated backup files:"
          ls -laR "$BACKUP_DIR"

  test-mongodb:
    runs-on: ubuntu-22.04
    services:
      mongo:
        image: mongo:8
        env:
          MONGO_INITDB_DATABASE: "database"
          MONGO_INITDB_ROOT_USERNAME: "user"
          MONGO_INITDB_ROOT_PASSWORD: "test"
        ports:
          - 27017:27017
    env:
      DB_TYPE: "mongodb"
      DB_HOST: "127.0.0.1"
      DB_PORT: 27017
      DB_NAME: "database"
      DB_USER: "user"
      DB_PASS: "test"
      DB_AUTH: "admin"
      DB_NAME_FILE: "**None**"
      DB_USER_FILE: "**None**"
      DB_PASS_FILE: "**None**"
      DB_PASSFILE_STORE: "**None**"
      DB_CLUSTER: "FALSE"
      DB_EXTRA_OPTS: ""
      BACKUP_DIR: "/tmp/backups"
      BACKUP_SUFFIX: ".archive.gz"
      BACKUP_LATEST_TYPE: "symlink"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      BACKUP_KEEP_MINS: 1440
      WEBHOOK_URL: "**None**"
      WEBHOOK_EXTRA_ARGS: ""
    steps:
      - uses: actions/checkout@v4

      - name: Install mongodb-database-tools
        run: |
          curl -fsSL https://pgp.mongodb.com/server-8.0.asc | sudo gpg --dearmor -o /usr/share/keyrings/mongodb-server-8.0.gpg
          echo "deb [arch=amd64,arm64 signed-by=/usr/share/keyrings/mongodb-server-8.0.gpg] https://repo.mongodb.org/apt/ubuntu jammy/mongodb-org/8.0 multiverse" | sudo tee /etc/apt/sources.list.d/mongodb-org-8.0.list
          sudo apt-get update
          sudo apt-get install -y mongodb-database-tools

      - name: Test backup script for mongodump
        run: |
          echo "Test backup script for mongodump..."
          rm -fR "$BACKUP_DIR"
          mkdir -p "$BACKUP_DIR"
          bash -x backup.sh
          echo "Generated backup files:"
          ls -laR "$BACKUP_DIR"

  test-bake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test docker-bake.hcl contents
        run: |
          echo "Test if docker-bake.hcl has been generated by generate-docker-bake.sh..."
          ./generate-docker-bake.sh docker-bake-generated.hcl
          cmp docker-bake.hcl docker-bake-generated.hcl

  test-docker:
    if: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
    needs: [ test-postgresql, test-mongodb, test-bake ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Test main-version image builds
        run: docker buildx bake --pull postgresql-debian-18 postgresql-alpine-18 mongodb-debian-8
